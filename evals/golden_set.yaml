# Golden Set — эталонный набор для оценки аудит-системы
#
# Источник изображений: реальные фотографии WB ПВЗ из папки /images/
# Человеческие метки (human_label) расставлены вручную на основе
# визуального осмотра и аннотаций из reference_annotations.yaml
#
# Поля:
#   id              — уникальный ID кейса
#   description     — краткое описание
#   image_path      — путь к изображению относительно корня проекта
#   scene_id        — ближайшая каноническая сцена из scene_catalog
#   object_id       — добавленный объект (null если нет)
#   expected_verdict — ожидаемое решение: ACCEPT / REJECT / NEEDS_REVIEW
#   expected_checks — какие checks должны PASS / FAIL (для детальной проверки)
#   human_label     — метка человека (совпадает с expected_verdict для консистентности)
#   human_notes     — обоснование решения

eval_cases:

