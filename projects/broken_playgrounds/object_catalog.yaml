# Object Catalog — Broken Playgrounds Domain
# Объекты повреждений и элементы площадки

objects:
  - id: cracked_slide_surface
    name: "cracked slide surface"
    category: damage
    description: "Пластиковый скат горки с продольной трещиной или сколом"
    allowed_zones: [slide_zone, general_overview]
    placement: on_slide_surface
    size_hint: medium
    color_palette: [faded_yellow, faded_red, grey_plastic]

  - id: rusty_handrail
    name: "rusty handrail"
    category: damage
    description: "Поручень с ржавчиной, местами отсутствующей краской"
    allowed_zones: [slide_zone, climbing_zone, general_overview]
    placement: attached_to_structure
    size_hint: medium
    color_palette: [rust_brown, faded_blue, bare_metal]

  - id: broken_swing_seat
    name: "broken swing seat"
    category: damage
    description: "Сломанное или отсутствующее сиденье качелей, свисающие цепи"
    allowed_zones: [swing_zone, general_overview]
    placement: hanging_from_frame
    size_hint: medium
    color_palette: [faded_black, rust_brown, faded_red]

  - id: missing_rung
    name: "missing rung on ladder"
    category: damage
    description: "Отсутствующая перекладина на лестнице или рукоходе"
    allowed_zones: [climbing_zone, general_overview]
    placement: gap_in_structure
    size_hint: small
    color_palette: [bare_metal, faded_paint]

  - id: peeling_paint
    name: "peeling paint on equipment"
    category: wear
    description: "Облупившаяся краска на металлических или деревянных элементах"
    allowed_zones: [slide_zone, swing_zone, climbing_zone, sandbox, general_overview]
    placement: on_surface
    size_hint: medium
    color_palette: [faded_blue, faded_red, faded_yellow, bare_wood]

  - id: broken_sandbox_board
    name: "broken sandbox board"
    category: damage
    description: "Сломанная доска бортика песочницы"
    allowed_zones: [sandbox, general_overview]
    placement: on_ground_edge
    size_hint: medium
    color_palette: [weathered_wood, faded_green]

  - id: litter_debris
    name: "litter and debris"
    category: environment
    description: "Мусор, бутылки, обёртки на площадке"
    allowed_zones: [sandbox, general_overview, swing_zone]
    placement: scattered_on_ground
    size_hint: small
    color_palette: [mixed]

  - id: overgrown_weeds
    name: "overgrown weeds"
    category: environment
    description: "Заросли травы и сорняков через покрытие площадки"
    allowed_zones: [sandbox, general_overview, slide_zone]
    placement: growing_through_surface
    size_hint: medium
    color_palette: [green, brown]

compatibility_rules:
  max_objects_per_iteration: 2
  universal_forbidden: [people, children, indoor_elements]
