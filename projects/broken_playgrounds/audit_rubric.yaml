# Audit Rubric — Broken Playgrounds Domain

audit_checks:
  - id: prompt_adherence
    name: "Prompt Adherence"
    type: vlm
    description: "Does the image match the requested scene with damage elements?"
    thresholds:
      accept: 0.75
      review: 0.50

  - id: domain_relevance
    name: "Domain Relevance"
    type: hybrid
    description: "Does the image look like a damaged playground in a residential area?"
    thresholds:
      accept: 0.75
      review: 0.55

  - id: technical_quality
    name: "Technical Quality"
    type: rule_based
    description: "Resolution, sharpness, exposure, artifacts check"
    thresholds:
      accept: 0.70
      review: 0.50

  - id: safety_pii
    name: "Safety & PII"
    type: hybrid
    description: "No people, children, PII, identifiable locations"
    hard_reject: true

  - id: object_integration
    name: "Object/Damage Integration"
    type: vlm
    description: "Is the damage element naturally integrated?"
    thresholds:
      accept: 0.70
      review: 0.45
    optional: true

aggregation:
  step_2_check_scores:
    weights:
      prompt_adherence: 0.30
      domain_relevance: 0.30
      technical_quality: 0.20
      object_integration: 0.20
